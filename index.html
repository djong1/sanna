<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billie Eilish Songs - Rate & Discover</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🎵 Billie Eilish Songs</h1>
        <p>Rate your favorite Billie Eilish songs and discover the most popular ones!</p>
    </header>

    <main>
        <section class="popular-songs">
            <h2>🏆 Most Popular Songs</h2>
            <div id="popular-list" class="song-grid">
                <!-- Popular songs will be populated here by JavaScript -->
            </div>
        </section>

        <section class="all-songs">
            <h2>🎶 All Songs</h2>
            <div id="songs-list" class="song-grid">
                <!-- Songs will be populated here by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>Made with ❤️ for Billie Eilish fans</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
